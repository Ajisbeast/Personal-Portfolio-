<script>
const NAV_H = 64;
const images = document.querySelectorAll("img.floater");
const SIZE = 110;

images.forEach(img => {
  let x = Math.random() * (window.innerWidth - SIZE);
  let y = NAV_H + Math.random() * (window.innerHeight - NAV_H - SIZE);
  let dx = (Math.random() * 1.5 + 0.5) * (Math.random() < 0.5 ? 1 : -1);
  let dy = (Math.random() * 1.5 + 0.5) * (Math.random() < 0.5 ? 1 : -1);

  function move() {
    x += dx; y += dy;
    if (x <= 0 || x + SIZE >= window.innerWidth) dx *= -1;
    if (y <= NAV_H || y + SIZE >= window.innerHeight) dy *= -1;
    img.style.left = x + "px";
    img.style.top  = y + "px";
    requestAnimationFrame(move);
  }
  move();
});
</script>
